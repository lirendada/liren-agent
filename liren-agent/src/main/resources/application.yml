spring:
  application:
    name: liren-agent
  profiles:
    active: local

# spring ai alibaba配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus

server:
  port: 8123
  servlet:
    context-path: /api

# sdk 或者 http 方式使用 api key
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.liren.lirenagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn